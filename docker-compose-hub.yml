version: '3.8'

# Builds both services from the GitHub repository source on deploy — no
# pre-built Docker Hub images required. Portainer clones the repo (branch
# main), builds the images on the server, and runs them. This always deploys
# the latest code from main.

services:
  frontend:
    build:
      context: https://github.com/amitkr64/sustainsutra.git#main
      dockerfile: Dockerfile
    container_name: sustainsutra-frontend
    restart: unless-stopped
    ports:
      - "8085:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - sustainsutra-network

  backend:
    build:
      context: https://github.com/amitkr64/sustainsutra.git#main
      dockerfile: backend/Dockerfile
    container_name: sustainsutra-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/sustainsutra
      # Fail closed on DB outage instead of falling back to demo-mode auth bypass.
      - REQUIRE_DB=true
      # JWT_SECRET is REQUIRED. Set it as a stack env var in Portainer, or
      # replace ${JWT_SECRET} below with a literal generated via:
      #   openssl rand -base64 64
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      - mongo
    networks:
      - sustainsutra-network

  mongo:
    image: mongo:7
    container_name: sustainsutra-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - sustainsutra-network

networks:
  sustainsutra-network:
    driver: bridge

volumes:
  mongo-data:
