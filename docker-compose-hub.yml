version: '3.8'

services:
  frontend:
    image: amitkr64/sustainsutra-frontend:latest
    container_name: sustainsutra-frontend
    restart: unless-stopped
    ports:
      - "8085:80"
    environment:
      - VITE_API_URL=http://backend:5000
      - NODE_ENV=production
    networks:
      - sustainsutra-network

  backend:
    image: amitkr64/sustainsutra-backend:latest
    container_name: sustainsutra-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/sustainsutra
      # Fail closed on DB outage instead of falling back to the (dev-only,
      # password-bypassing) demo mode. Demo mode is unreachable in production
      # regardless, but this makes the failure explicit.
      - REQUIRE_DB=true
      # JWT_SECRET is REQUIRED — there is no insecure default. Generate one with:
      #   openssl rand -base64 64
      # Set it as an environment variable in Portainer (or a .env file next to
      # this compose file) before deploying. Compose fails fast if it's unset.
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required. Generate with: openssl rand -base64 64}
    depends_on:
      - mongo
    networks:
      - sustainsutra-network

  mongo:
    image: mongo:7
    container_name: sustainsutra-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - sustainsutra-network

networks:
  sustainsutra-network:
    driver: bridge

volumes:
  mongo-data:
