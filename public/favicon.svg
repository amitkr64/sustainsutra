<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="6" y="6" width="88" height="88" rx="22" fill="url(#leafGrad)" />
  <!-- Abstract leaf: two overlapping arcs forming a leaf + growth curve -->
  <path d="M 30 70 Q 30 35, 65 30 Q 70 65, 30 70 Z" fill="#ffffff" fill-opacity="0.95"/>
  <!-- Vein / growth line -->
  <path d="M 32 68 Q 45 55, 63 32" fill="none" stroke="#0D9488" stroke-width="3" stroke-linecap="round"/>
</svg>
